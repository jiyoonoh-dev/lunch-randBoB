<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 점심 랜덤뽑기 · Lunch RandBoB</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='3' y='3' width='26' height='26' rx='6' fill='%23E84F1C'/><circle cx='10' cy='10' r='2.4' fill='white'/><circle cx='22' cy='10' r='2.4' fill='white'/><circle cx='16' cy='16' r='2.4' fill='white'/><circle cx='10' cy='22' r='2.4' fill='white'/><circle cx='22' cy='22' r='2.4' fill='white'/></svg>">
<script type="text/javascript"
  src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7e2503b11d19c499fcc962077e60068e&libraries=services"></script>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />


<style>
  :root {
    /* 지도 위 floating UI — 크리스프 화이트 베이스 + 강한 오렌지 시그니처 */
    --bg: #F5F2EA;          /* 거의 보이지 않는 폴백 */
    --paper: #FFFFFF;       /* 크리스프 화이트 — 지도 위에서 확 떠보임 */
    --paper-2: #FBF8F1;     /* 살짝 따뜻한 보조 표면 */
    --ink: #1A1F2E;         /* 따뜻한 다크 잉크 */
    --ink-2: #4A5267;
    --mute: #8E8978;
    --line: #E8E2D2;
    --line-2: #F0ECDF;
    --vermilion: #F4732B;   /* 🍊 시그니처 탠저린 — 채도 강화 */
    --vermilion-soft: rgba(244, 115, 43, 0.10);
    --vermilion-dark: #DE6320;
    --cobalt: #3D5FA8;      /* 접시 레터링 블루 (보조 — 정보·맥락) */
    --cobalt-soft: rgba(61, 95, 168, 0.10);
    --yolk: #F2BB3F;        /* 노른자 노랑 */
    --sage: #6B8F4F;
    --shadow-sm: 0 1px 2px rgba(26,31,46,.08), 0 4px 12px -4px rgba(26,31,46,.14);
    --shadow-md: 0 2px 6px rgba(26,31,46,.10), 0 12px 28px -8px rgba(26,31,46,.18);
    --shadow-lg: 0 -4px 12px rgba(26,31,46,.08), 0 -16px 40px -8px rgba(26,31,46,.20);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-snap: cubic-bezier(0.32, 0.72, 0, 1);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }

  /* ───────── Map (전체화면) ───────── */
  #map {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  /* ───────── Top bar (검색 + 액션) ───────── */
  .top-bar {
    position: fixed;
    top: 14px; left: 14px; right: 14px;
    z-index: 20;
    display: flex;
    gap: 8px;
    align-items: stretch;
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }

  .search-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
    background: var(--paper);
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    display: flex;
    align-items: center;
    height: 46px;
    padding: 0 6px 0 12px;
    transition: box-shadow .15s;
  }
  .search-wrap:focus-within {
    box-shadow: var(--shadow-md), 0 0 0 2px var(--vermilion);
  }
  .search-wrap:focus-within .icon { color: var(--vermilion); }
  .search-wrap .icon {
    color: var(--mute);
    flex-shrink: 0;
  }
  #searchInput {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 15px;
    padding: 0 10px;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
    height: 100%;
  }
  #searchInput::placeholder { color: var(--mute); }
  .search-clear {
    width: 30px; height: 30px;
    border: none;
    background: transparent;
    color: var(--mute);
    cursor: pointer;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .search-clear.show { display: flex; }
  .search-clear:hover { background: var(--line-2); }

  .search-results {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--paper);
    border-radius: 12px;
    max-height: 320px;
    overflow-y: auto;
    box-shadow: var(--shadow-md);
    display: none;
    overscroll-behavior: contain;
  }
  .search-results.show { display: block; }
  .search-item {
    padding: 11px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--line-2);
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--cobalt-soft); }
  .search-item-name {
    font-weight: 600;
    font-size: 14px;
    margin: 0 0 3px;
    color: var(--ink);
  }
  .search-item-cat {
    font-size: 11px;
    color: var(--cobalt);
    font-weight: 500;
    margin-left: 6px;
  }
  .search-item-addr {
    font-size: 12px;
    color: var(--mute);
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .search-item-empty {
    padding: 18px 14px;
    text-align: center;
    color: var(--mute);
    font-size: 13px;
  }

  /* 액션 아이콘 버튼 */
  .icon-btn {
    width: 46px; height: 46px;
    background: var(--paper);
    border: none;
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-2);
    transition: color .15s, background .15s, transform .12s;
    flex-shrink: 0;
    position: relative;
  }
  .icon-btn:hover { color: var(--ink); }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn.active {
    background: var(--ink);
    color: var(--paper);
  }
  .icon-btn.pulse::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border: 2px solid var(--vermilion);
    animation: pulse .6s ease-out;
  }
  @keyframes pulse {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(1.4); }
  }

  /* ───────── Map hint (pickMode 안내) ───────── */
  .map-hint {
    position: fixed;
    top: 76px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: rgba(31,27,22,.92);
    color: #fff;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    z-index: 19;
    pointer-events: none;
    backdrop-filter: blur(8px);
    font-weight: 500;
  }
  .map-hint.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ───────── Bottom control card ───────── */
  .bottom-bar {
    position: fixed;
    bottom: 16px; left: 14px; right: 14px;
    z-index: 15;
    background: var(--paper);
    border-radius: 16px;
    box-shadow: var(--shadow-md);
    transition: opacity .25s, transform .25s var(--ease-out);
  }
  .bottom-bar.hidden {
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
  }

  .bottom-inner {
    padding: 14px 16px 12px;
  }

  /* 슬라이더 라벨 + 값 */
  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--mute);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .slider-value {
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: none;
    font-feature-settings: "tnum";
  }
  .slider-value .time {
    color: var(--mute);
    font-weight: 500;
    margin-left: 4px;
  }

  input[type=range].slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    margin: 0;
    cursor: pointer;
    display: block;
  }
  input[type=range].slider::-webkit-slider-runnable-track {
    height: 4px;
    background: linear-gradient(to right,
      var(--vermilion) 0%,
      var(--vermilion) var(--fill, 22%),
      var(--line) var(--fill, 22%),
      var(--line) 100%);
    border-radius: 2px;
  }
  input[type=range].slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 50%;
    margin-top: -7px;
    cursor: grab;
    box-shadow: 0 1px 3px rgba(42,32,20,0.2);
    transition: transform .1s;
  }
  input[type=range].slider:active::-webkit-slider-thumb {
    transform: scale(1.18);
    cursor: grabbing;
  }
  input[type=range].slider::-moz-range-track {
    height: 4px;
    background: var(--line);
    border-radius: 2px;
  }
  input[type=range].slider::-moz-range-progress {
    height: 4px;
    background: var(--vermilion);
    border-radius: 2px;
  }
  input[type=range].slider::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 50%;
    cursor: grab;
  }

  /* 컨트롤 row (segmented + category) */
  .control-row {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-top: 14px;
  }

  /* Segmented control (개수) */
  .segmented {
    display: flex;
    background: rgba(42, 32, 20, 0.07);
    border-radius: 10px;
    padding: 3px;
    flex: 1;
    min-width: 0;
  }
  .seg-btn {
    flex: 1;
    padding: 8px 0;
    background: transparent;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-2);
    font-feature-settings: "tnum";
    transition: all .15s;
  }
  .seg-btn:hover { color: var(--ink); }
  .seg-btn.active {
    background: var(--vermilion);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 1px 3px rgba(244, 115, 43, 0.35);
  }

  /* 카테고리 ghost 아이콘 버튼 */
  .ctrl-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .ctrl-btn {
    width: 38px; height: 38px;
    background: transparent;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-2);
    transition: all .15s;
    flex-shrink: 0;
    padding: 0;
  }
  .ctrl-btn:hover {
    background: rgba(42, 32, 20, 0.07);
    color: var(--ink);
  }
  .ctrl-btn.open {
    background: var(--ink);
    color: var(--paper);
  }

  /* CTA — 카드 하단으로 흘러붙음 */
  .cta {
    width: 100%;
    padding: 15px;
    font-size: 15px;
    font-weight: 800;
    background: var(--vermilion);
    color: #fff;
    border: none;
    border-radius: 0 0 16px 16px;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: background .12s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
  }
  .cta:hover { background: var(--vermilion-dark); }
  .cta:active { transform: scale(0.995); }
  .cta:disabled {
    background: var(--line);
    color: var(--mute);
    cursor: not-allowed;
  }
  .cta .dice-ico { transition: transform .3s; }
  .cta.rolling .dice-ico {
    animation: roll 0.6s linear infinite;
  }
  @keyframes roll {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ───────── Popover (카테고리 / 개수) ───────── */
  .popover {
    position: absolute;
    bottom: calc(100% + 12px);
    background: var(--paper);
    border-radius: 14px;
    box-shadow: var(--shadow-md);
    padding: 14px;
    z-index: 25;
    display: none;
    animation: popIn .18s var(--ease-out);
    transform-origin: bottom right;
  }
  .popover.show { display: block; }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(6px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .popover::after {
    content: '';
    position: absolute;
    bottom: -6px;
    width: 12px; height: 12px;
    background: var(--paper);
    transform: rotate(45deg);
  }

  .popover-cat {
    right: 0;
    width: min(340px, calc(100vw - 28px));
  }
  .popover-cat::after { right: 16px; }

  .popover-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mute);
    margin: 0 0 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .preset-row {
    display: flex;
    gap: 4px;
  }
  .preset-btn {
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    background: transparent;
    border: none;
    color: var(--cobalt);
    cursor: pointer;
    padding: 3px 7px;
    border-radius: 5px;
    letter-spacing: 0;
    text-transform: none;
  }
  .preset-btn:hover { background: var(--cobalt-soft); }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .chip {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 11px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 20px;
    cursor: pointer;
    color: var(--mute);
    transition: all .12s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--ink-2); color: var(--ink-2); }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .chip.active:hover { background: #000; }

  /* ───────── Bottom sheet (결과) ───────── */
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 30;
    background: var(--paper);
    border-radius: 18px 18px 0 0;
    box-shadow: var(--shadow-lg);
    height: 0;
    transition: height .45s var(--ease-snap);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    touch-action: none;
  }
  .sheet.dragging { transition: none; }
  .sheet.closed { height: 0 !important; }

  .sheet-handle {
    padding: 9px 0 6px;
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
    touch-action: none;
  }
  .sheet-handle:active { cursor: grabbing; }
  .handle-bar {
    width: 40px; height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin: 0 auto;
    transition: background .15s;
  }
  .sheet-handle:hover .handle-bar { background: var(--mute); }

  .sheet-header {
    padding: 4px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--line-2);
    flex-shrink: 0;
  }
  .sheet-title-area { min-width: 0; flex: 1; }
  .sheet-title {
    font-size: 16px;
    font-weight: 800;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .sheet-meta {
    font-size: 11px;
    color: var(--mute);
    margin: 0;
    font-feature-settings: "tnum";
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sheet-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-repick {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    background: var(--vermilion);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .12s;
  }
  .btn-repick:hover { background: var(--vermilion-dark); }
  .btn-repick.rolling .dice-ico { animation: roll 0.6s linear infinite; }
  .icon-btn-sm {
    width: 34px; height: 34px;
    background: transparent;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .12s;
  }
  .icon-btn-sm:hover { background: var(--line-2); }

  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* 카드 */
  .card {
    padding: 14px 0;
    border-bottom: 1px solid var(--line-2);
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 12px;
    cursor: pointer;
    transition: background .12s;
    margin: 0 -8px;
    padding-left: 8px;
    padding-right: 8px;
    border-radius: 8px;
  }
  .card:hover { background: var(--cobalt-soft); }
  .card:last-child { border-bottom: none; }
  .card-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--vermilion);
    line-height: 1.3;
    padding-top: 2px;
    font-feature-settings: "tnum";
  }
  .card-body { min-width: 0; }
  .card-name {
    font-weight: 700;
    font-size: 15px;
    margin: 0 0 3px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .card-meta {
    font-size: 12px;
    color: var(--ink-2);
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0 6px;
  }
  .card-cat { color: var(--cobalt); font-weight: 600; }
  .card-dist, .card-walk {
    color: var(--mute);
    font-feature-settings: "tnum";
  }
  .card-walk::before { content: '·'; margin-right: 6px; color: var(--line); }
  .card-addr {
    font-size: 12px;
    color: var(--mute);
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-link {
    font-size: 12px;
    color: var(--cobalt);
    text-decoration: none;
    font-weight: 700;
    margin-top: 8px;
    display: inline-block;
    padding: 5px 10px;
    background: var(--cobalt-soft);
    border-radius: 6px;
    transition: background .12s;
  }
  .card-link:hover { background: rgba(37, 71, 208, 0.16); }

  .card-enter {
    opacity: 0;
    transform: translateY(6px);
    animation: cardIn .4s var(--ease-out) forwards;
  }
  .card-enter:nth-child(1) { animation-delay: 0.05s; }
  .card-enter:nth-child(2) { animation-delay: 0.13s; }
  .card-enter:nth-child(3) { animation-delay: 0.21s; }
  .card-enter:nth-child(4) { animation-delay: 0.29s; }
  .card-enter:nth-child(5) { animation-delay: 0.37s; }
  .card-enter:nth-child(6) { animation-delay: 0.45s; }
  .card-enter:nth-child(7) { animation-delay: 0.53s; }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ───────── Map markers ───────── */
  .pin {
    width: 32px; height: 32px;
    background: var(--vermilion);
    color: #fff;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    font-feature-settings: "tnum";
    box-shadow: 0 3px 10px rgba(244, 115, 43, .50);
    border: 2px solid #fff;
  }
  .pin span { transform: rotate(45deg); }
  .pin.active {
    animation: markerPulse .8s ease-out;
  }
  @keyframes markerPulse {
    0% { transform: rotate(-45deg) scale(1); }
    50% { transform: rotate(-45deg) scale(1.3); }
    100% { transform: rotate(-45deg) scale(1); }
  }

  .center-pin {
    width: 16px; height: 16px;
    background: var(--cobalt);
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(37, 71, 208, .5);
  }

  /* ───────── Toast ───────── */
  .toast {
    position: fixed;
    top: 76px;
    left: 50%;
    transform: translateX(-50%) translateY(-12px);
    background: var(--ink);
    color: var(--paper);
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity .25s, transform .25s var(--ease-out);
    pointer-events: none;
    z-index: 100;
    box-shadow: var(--shadow-md);
    max-width: calc(100% - 40px);
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: var(--vermilion); }

  /* ───────── 모바일 미세조정 ───────── */
  @media (max-width: 480px) {
    .top-bar { top: 10px; left: 10px; right: 10px; gap: 6px; }
    .bottom-bar { bottom: 10px; left: 10px; right: 10px; }
    .popover-cat { width: calc(100vw - 28px); }
  }

  /* iOS Safari: 100vh 이슈 보정 */
  @supports (-webkit-touch-callout: none) {
    .sheet { max-height: -webkit-fill-available; }
  }
</style>
</head>

<body>

            <button class="chip active" data-cat="퓨전요리">퓨전요리</button>
            <button class="chip active" data-cat="세계음식">세계음식</button>
            <button class="chip active" data-cat="패밀리레스토랑">패밀리</button>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  // ─── State ──────────────────────────────────────────────────
  let map, ps;
  let currentPos = null;
  let radius = 150;
  let pickCount = 5;
  let pickMode = false;
  let centerMarker = null;
  let radiusCircle = null;
  let resultMarkers = [];
  let lastPool = [];

  const KNOWN_CATEGORIES = [
    '한식', '중식', '일식', '양식', '분식',
    '치킨', '피자', '패스트푸드',
    '뷔페', '도시락', '죽', '샐러드', '샤브샤브',
    '퓨전요리', '세계음식', '패밀리레스토랑',
    '술집', '요리주점'
  ];
  const DRINKING = ['술집', '요리주점'];
  const LUNCH_PRESET = new Set([
    ...KNOWN_CATEGORIES.filter(c => !DRINKING.includes(c)),
    '기타'
  ]);
  const ALL_PRESET = new Set([...KNOWN_CATEGORIES, '기타']);

  let activeCategories = new Set(LUNCH_PRESET);

  // ─── DOM ────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  const searchInput = $('searchInput');
  const searchClear = $('searchClear');
  const searchResults = $('searchResults');
  const btnMyLoc = $('btnMyLoc');
  const btnPickMode = $('btnPickMode');
  const mapHint = $('mapHint');

  const bottomBar = $('bottomBar');
  const radiusSlider = $('radiusSlider');
  const radiusM = $('radiusM');
  const radiusTime = $('radiusTime');

  const btnCategory = $('btnCategory');
  const catPopover = $('catPopover');
  const catChips = $('catChips');

  const countSegmented = $('countSegmented');
  const ctaText = $('ctaText');

  const btnPick = $('btnPick');

  const sheet = $('sheet');
  const sheetHandle = $('sheetHandle');
  const sheetMeta = $('sheetMeta');
  const sheetBody = $('sheetBody');
  const btnRepick = $('btnRepick');
  const btnSheetClose = $('btnSheetClose');

  const toast = $('toast');

  // ─── Kakao Map ──────────────────────────────────────────────
  if (typeof kakao === 'undefined' || !kakao.maps) {
    showToast('카카오맵 SDK 로드 실패. JavaScript 키를 확인하세요.', true);
    return;
  }

  kakao.maps.load(function () {
    const defaultCenter = new kakao.maps.LatLng(37.4979, 127.0276);
    map = new kakao.maps.Map($('map'), { center: defaultCenter, level: 4 });
    ps = new kakao.maps.services.Places();

    kakao.maps.event.addListener(map, 'click', e => {
      if (!pickMode) return;
      const ll = e.latLng;
      setCurrentPos(ll.getLat(), ll.getLng(), '지정한 위치');
      togglePickMode(false);
    });

    tryGeolocation();
    updateSliderUI();
  });

  // ─── Geolocation ────────────────────────────────────────────
  function tryGeolocation() {
    btnMyLoc.classList.add('pulse');
    setTimeout(() => btnMyLoc.classList.remove('pulse'), 700);

    if (!navigator.geolocation) {
      setCurrentPos(37.4979, 127.0276, '강남역 (기본값)');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => setCurrentPos(pos.coords.latitude, pos.coords.longitude, '현재 위치'),
      err => {
        console.warn('Geolocation failed:', err);
        showToast('위치 권한이 거부됨. 검색하거나 지도를 길게 눌러 지정하세요.');
        setCurrentPos(37.4979, 127.0276, '강남역 (기본값)');
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  }

  function setCurrentPos(lat, lng, label) {
    currentPos = { lat, lng };
    const ll = new kakao.maps.LatLng(lat, lng);
    map.setCenter(ll);

    if (centerMarker) centerMarker.setMap(null);
    centerMarker = new kakao.maps.CustomOverlay({
      position: ll,
      content: '<div class="center-pin"></div>',
      yAnchor: 0.5, xAnchor: 0.5, zIndex: 10
    });
    centerMarker.setMap(map);

    drawRadiusCircle();
  }

  function drawRadiusCircle() {
    if (!currentPos) return;
    if (radiusCircle) radiusCircle.setMap(null);
    radiusCircle = new kakao.maps.Circle({
      center: new kakao.maps.LatLng(currentPos.lat, currentPos.lng),
      radius: radius,
      strokeWeight: 1.5,
      strokeColor: '#3D5FA8',
      strokeOpacity: 0.55,
      strokeStyle: 'dashed',
      fillColor: '#3D5FA8',
      fillOpacity: 0.05,
    });
    radiusCircle.setMap(map);

    // 반경 작아져서 줌 더 가깝게
    const levelMap = { 50: 1, 100: 2, 150: 2, 200: 3, 250: 3, 300: 3, 350: 3, 400: 3, 450: 4, 500: 4 };
    map.setLevel(levelMap[radius] || 3);
  }

  // ─── Top bar bindings ───────────────────────────────────────
  btnMyLoc.addEventListener('click', tryGeolocation);
  btnPickMode.addEventListener('click', () => togglePickMode(!pickMode));

  function togglePickMode(on) {
    pickMode = on;
    mapHint.classList.toggle('show', on);
    btnPickMode.classList.toggle('active', on);
    document.getElementById('map').style.cursor = on ? 'crosshair' : '';
  }

  // ─── Search ─────────────────────────────────────────────────
  function doSearch() {
    const q = searchInput.value.trim();
    if (!q) return;
    ps.keywordSearch(q, (data, status) => {
      if (status === kakao.maps.services.Status.ZERO_RESULT) {
        searchResults.innerHTML = '<div class="search-item-empty">검색 결과가 없습니다</div>';
        searchResults.classList.add('show');
        return;
      }
      if (status !== kakao.maps.services.Status.OK) {
        showToast('검색 실패', true);
        return;
      }
      renderSearchResults(data.slice(0, 10));
    });
  }

  function renderSearchResults(items) {
    searchResults.innerHTML = items.map((p, i) => `
      <div class="search-item" data-idx="${i}">
        <p class="search-item-name">
          ${escapeHTML(p.place_name)}
          <span class="search-item-cat">${escapeHTML(shortCategory(p.category_name))}</span>
        </p>
        <p class="search-item-addr">${escapeHTML(p.road_address_name || p.address_name || '')}</p>
      </div>`).join('');
    searchResults.classList.add('show');

    searchResults.querySelectorAll('.search-item').forEach(el => {
      el.addEventListener('click', () => {
        const p = items[parseInt(el.dataset.idx, 10)];
        setCurrentPos(parseFloat(p.y), parseFloat(p.x), p.place_name);
        searchResults.classList.remove('show');
        searchInput.value = p.place_name;
        searchClear.classList.add('show');
      });
    });
  }

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
    else if (e.key === 'Escape') { searchResults.classList.remove('show'); searchInput.blur(); }
  });
  searchInput.addEventListener('input', () => {
    const has = !!searchInput.value;
    searchClear.classList.toggle('show', has);
    if (!has) searchResults.classList.remove('show');
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.classList.remove('show');
    searchResults.classList.remove('show');
    searchInput.focus();
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
  });

  // ─── Radius slider ──────────────────────────────────────────
  radiusSlider.addEventListener('input', () => {
    radius = parseInt(radiusSlider.value, 10);
    updateSliderUI();
    drawRadiusCircle();
  });

  function updateSliderUI() {
    radiusM.textContent = radius + 'm';
    radiusTime.textContent = '· 약 ' + walkingMinutes(radius);
    const fillPct = ((radius - 50) / (500 - 50)) * 100;
    radiusSlider.style.setProperty('--fill', fillPct + '%');
  }

  // ─── Category popover ───────────────────────────────────────
  btnCategory.addEventListener('click', e => {
    e.stopPropagation();
    togglePopover(catPopover, btnCategory);
  });
  catChips.addEventListener('click', e => {
    e.stopPropagation();
    const chip = e.target.closest('.chip');
    if (!chip) return;
    const cat = chip.dataset.cat;
    if (activeCategories.has(cat)) {
      activeCategories.delete(cat);
      chip.classList.remove('active');
    } else {
      activeCategories.add(cat);
      chip.classList.add('active');
    }
  });
  catPopover.querySelectorAll('[data-preset]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const p = btn.dataset.preset;
      let target;
      if (p === 'all') target = new Set(ALL_PRESET);
      else if (p === 'none') target = new Set();
      else target = new Set(LUNCH_PRESET);
      activeCategories = target;
      catChips.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('active', target.has(c.dataset.cat));
      });
    });
  });

  // ─── Count segmented control ───────────────────────────────
  countSegmented.addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    pickCount = parseInt(btn.dataset.n, 10);
    ctaText.textContent = pickCount + '개 뽑기';
    countSegmented.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  function togglePopover(pop, btn) {
    const open = pop.classList.toggle('show');
    btn.classList.toggle('open', open);
  }
  function closePopover(pop, btn) {
    pop.classList.remove('show');
    btn.classList.remove('open');
  }

  // 바깥 클릭 시 popover 닫기
  document.addEventListener('click', e => {
    if (!btnCategory.contains(e.target) && !catPopover.contains(e.target)) {
      closePopover(catPopover, btnCategory);
    }
  });

  // ─── Pick restaurants ───────────────────────────────────────
  btnPick.addEventListener('click', () => pickRestaurants(false));
  btnRepick.addEventListener('click', () => pickRestaurants(true));

  async function pickRestaurants(reshuffleOnly) {
    if (!currentPos) {
      showToast('먼저 위치를 정해주세요', true);
      return;
    }
    const targetBtn = reshuffleOnly ? btnRepick : btnPick;
    targetBtn.disabled = true;
    targetBtn.classList.add('rolling');

    try {
      let pool;
      if (reshuffleOnly && lastPool.length > 0) {
        pool = lastPool;
      } else {
        const all = await fetchAllRestaurants();
        pool = all.filter(p => activeCategories.has(getMainCategory(p.category_name)));
        lastPool = pool;

        if (pool.length === 0) {
          if (all.length === 0) {
            showToast(`반경 ${formatRadius(radius)} 안에 음식점이 없어요`, true);
          } else if (activeCategories.size === 0) {
            showToast('카테고리를 하나 이상 선택해주세요', true);
          } else {
            showToast(`반경 ${formatRadius(radius)} 안에 ${all.length}곳 있지만\n선택한 카테고리에 해당하는 곳이 없어요`, true);
          }
          clearResultMarkers();
          closeSheet();
          return;
        }
      }

      const picked = shuffle(pool).slice(0, pickCount);
      renderResults(picked, pool.length);
      renderResultMarkers(picked);
      openSheetDramatically();

    } catch (err) {
      console.error(err);
      showToast('검색 실패: ' + err.message, true);
    } finally {
      targetBtn.disabled = false;
      targetBtn.classList.remove('rolling');
    }
  }

  function fetchAllRestaurants() {
    return new Promise((resolve, reject) => {
      const collected = [];
      let page = 1;
      const maxPages = 3;
      const opts = {
        location: new kakao.maps.LatLng(currentPos.lat, currentPos.lng),
        radius: radius,
        sort: kakao.maps.services.SortBy.DISTANCE,
      };
      const cb = (data, status, pagination) => {
        if (status === kakao.maps.services.Status.ZERO_RESULT) return resolve(collected);
        if (status !== kakao.maps.services.Status.OK) return reject(new Error('카카오 API 오류 (' + status + ')'));
        collected.push(...data);
        if (pagination.hasNextPage && page < maxPages) { page++; pagination.nextPage(); }
        else resolve(collected);
      };
      ps.categorySearch('FD6', cb, opts);
    });
  }

  // ─── Render ─────────────────────────────────────────────────
  function renderResults(picked, poolCount) {
    sheetMeta.textContent = `반경 ${formatRadius(radius)} · ${poolCount}곳 중 ${picked.length}곳`;
    sheetBody.innerHTML = picked.map((p, i) => cardHTML(p, i + 1)).join('');

    sheetBody.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        const idx = parseInt(card.dataset.idx, 10);
        const p = picked[idx];
        const ll = new kakao.maps.LatLng(parseFloat(p.y), parseFloat(p.x));
        map.panTo(ll);
        // 마커 강조
        const markerEl = resultMarkers[idx]?.getContent?.()?.querySelector?.('.pin');
        if (markerEl) {
          markerEl.classList.remove('active');
          void markerEl.offsetWidth;
          markerEl.classList.add('active');
        }
      });
    });
  }

  function cardHTML(p, n) {
    const cat = shortCategory(p.category_name);
    const dist = formatDistance(p.distance);
    const walk = walkingMinutes(parseInt(p.distance, 10));
    const addr = p.road_address_name || p.address_name || '';
    const num = String(n).padStart(2, '0');
    return `
      <div class="card card-enter" data-idx="${n - 1}">
        <div class="card-num">${num}</div>
        <div class="card-body">
          <p class="card-name">${escapeHTML(p.place_name)}</p>
          <p class="card-meta">
            <span class="card-cat">${escapeHTML(cat)}</span>
            <span class="card-dist">${dist}</span>
            <span class="card-walk">🚶 ${walk}</span>
          </p>
          <p class="card-addr">${escapeHTML(addr)}</p>
          <a class="card-link" href="${p.place_url}" target="_blank" rel="noopener">
            🕒 영업시간 · 메뉴 보기 →
          </a>
        </div>
      </div>`;
  }

  function renderResultMarkers(picked) {
    clearResultMarkers();
    const bounds = new kakao.maps.LatLngBounds();
    bounds.extend(new kakao.maps.LatLng(currentPos.lat, currentPos.lng));

    picked.forEach((p, i) => {
      const ll = new kakao.maps.LatLng(parseFloat(p.y), parseFloat(p.x));
      const overlay = new kakao.maps.CustomOverlay({
        position: ll,
        content: `<div class="pin"><span>${i + 1}</span></div>`,
        yAnchor: 1, xAnchor: 0.5,
      });
      overlay.setMap(map);
      resultMarkers.push(overlay);
      bounds.extend(ll);
    });
    map.setBounds(bounds, 60, 60, 60, 60);
  }
  function clearResultMarkers() {
    resultMarkers.forEach(m => m.setMap(null));
    resultMarkers = [];
  }

  // ─── Bottom sheet ───────────────────────────────────────────
  const SNAPS = [0, 35, 60, 90];   // % of viewport height
  let sheetHeightPct = 0;

  function snapTo(pct, instant) {
    sheetHeightPct = pct;
    if (instant) sheet.classList.add('dragging');
    sheet.style.height = pct + '%';
    sheet.classList.toggle('closed', pct === 0);
    if (instant) requestAnimationFrame(() => sheet.classList.remove('dragging'));
    // 하단 컨트롤 바: 시트 60% 이상이면 가림
    bottomBar.classList.toggle('hidden', pct >= 60);
  }

  function openSheetDramatically() {
    snapTo(90);
    setTimeout(() => { if (sheetHeightPct === 90) snapTo(60); }, 1000);
  }

  function closeSheet() {
    snapTo(0);
  }
  btnSheetClose.addEventListener('click', closeSheet);

  // 드래그 처리
  let dragging = false;
  let dragStartY = 0;
  let dragStartPct = 0;

  sheetHandle.addEventListener('pointerdown', e => {
    dragging = true;
    dragStartY = e.clientY;
    dragStartPct = sheetHeightPct;
    sheet.classList.add('dragging');
    sheetHandle.setPointerCapture(e.pointerId);
  });
  sheetHandle.addEventListener('pointermove', e => {
    if (!dragging) return;
    const deltaY = dragStartY - e.clientY;
    const deltaPct = (deltaY / window.innerHeight) * 100;
    const newPct = Math.max(0, Math.min(90, dragStartPct + deltaPct));
    sheet.style.height = newPct + '%';
    sheetHeightPct = newPct;
  });
  sheetHandle.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    sheet.classList.remove('dragging');
    // 가장 가까운 스냅 포인트로
    const nearest = SNAPS.reduce((best, s) =>
      Math.abs(s - sheetHeightPct) < Math.abs(best - sheetHeightPct) ? s : best);
    snapTo(nearest);
    sheetHandle.releasePointerCapture(e.pointerId);
  });
  sheetHandle.addEventListener('pointercancel', () => {
    dragging = false;
    sheet.classList.remove('dragging');
  });

  // 핸들 클릭(드래그 아닌 단순 탭)으로 다음 스냅 순환
  let tapStartTime = 0;
  let tapStartY = 0;
  sheetHandle.addEventListener('pointerdown', e => {
    tapStartTime = Date.now();
    tapStartY = e.clientY;
  });
  sheetHandle.addEventListener('pointerup', e => {
    const dt = Date.now() - tapStartTime;
    const dy = Math.abs(e.clientY - tapStartY);
    if (dt < 200 && dy < 5) {
      // 단순 탭: 다음 스냅으로
      const idx = SNAPS.indexOf(sheetHeightPct);
      if (idx >= 0) {
        const next = idx === SNAPS.length - 1 ? 0 : idx + 1;
        snapTo(SNAPS[next]);
      }
    }
  });

  // ─── Utils ──────────────────────────────────────────────────
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function shortCategory(s) {
    if (!s) return '음식점';
    const parts = s.split('>').map(x => x.trim());
    return parts.slice(1).join(' · ') || parts[0];
  }
  function getMainCategory(name) {
    if (!name) return '기타';
    const parts = name.split('>').map(s => s.trim());
    const main = parts[1] || parts[0];
    return KNOWN_CATEGORIES.includes(main) ? main : '기타';
  }
  function formatDistance(d) {
    const n = parseInt(d, 10);
    if (!n) return '';
    return n < 1000 ? `${n}m` : `${(n / 1000).toFixed(1)}km`;
  }
  function walkingMinutes(meters) {
    const m = parseInt(meters, 10);
    if (!m || m < 40) return '1분 이내';
    return Math.ceil(m / 75) + '분';
  }
  function formatRadius(r) {
    return r < 1000 ? `${r}m` : `${r / 1000}km`;
  }
  function escapeHTML(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  let toastTimer;
  function showToast(msg, isError) {
    toast.innerHTML = String(msg).replace(/\n/g, '<br>');
    toast.classList.toggle('error', !!isError);
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
  }
})();
</script>

</body>
</html>
